services:
  tv-orchestrator:
    build: .
    container_name: tv-orchestrator
    restart: unless-stopped
    ports:
      - "3080:3080"
    env_file:
      - .env
    environment:
      DATA_DIR: /data
      TV_LIBRARY: /media/tv
      MOVIE_LIBRARY: /media/movies
      DOWNLOADS: /media/downloads
      HOST_PROJECT_DIR: /host/project
      # Absolute path on the Proxmox host (written by ./update.sh / install.sh)
      COMPOSE_HOST_DIR: ${COMPOSE_HOST_DIR:-}
    volumes:
      - ./data:/data
      - ${TV_LIBRARY_HOST:-./media/tv}:/media/tv
      - ${MOVIE_LIBRARY_HOST:-./media/movies}:/media/movies
      - ${DOWNLOADS_HOST:-./media/downloads}:/media/downloads
      # Self-update from Admin → Update (git pull + rebuild)
      - .:/host/project
      - /var/run/docker.sock:/var/run/docker.sock
