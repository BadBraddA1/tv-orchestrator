<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TV Orchestrator</title>
    <link rel="stylesheet" href="/css/app.css" />
  </head>
  <body>
    <div id="app">
      <section id="loginView" class="login-view">
        <div class="login-card">
          <p class="eyebrow">Household TV</p>
          <h1>Request shows</h1>
          <p class="sub">Search, request, and watch it land in Plex — with a clear trail.</p>
          <form id="loginForm">
            <label>
              Username
              <input name="username" autocomplete="username" required />
            </label>
            <label>
              Password
              <input name="password" type="password" autocomplete="current-password" required />
            </label>
            <button type="submit">Sign in</button>
            <p id="loginError" class="error" hidden></p>
          </form>
        </div>
      </section>

      <section id="mainView" class="main-view" hidden>
        <header class="top">
          <div>
            <p class="eyebrow">TV Orchestrator</p>
            <h1>Discover</h1>
          </div>
          <div class="top-right">
            <span id="whoami" class="who"></span>
            <button type="button" id="logoutBtn" class="ghost">Log out</button>
          </div>
        </header>

        <nav class="tabs">
          <button type="button" data-tab="search" class="tab active">Search</button>
          <button type="button" data-tab="library" class="tab">Library</button>
          <button type="button" data-tab="activity" class="tab">Activity</button>
          <button type="button" data-tab="requests" class="tab">Requests</button>
          <button type="button" data-tab="cleanup" class="tab">Cleanup</button>
          <button type="button" data-tab="admin" class="tab admin-only" hidden>Admin</button>
        </nav>

        <div id="tab-search" class="tab-panel">
          <form id="searchForm" class="search-row">
            <input id="searchInput" placeholder="Search TV shows…" autocomplete="off" />
            <button type="submit">Search</button>
          </form>
          <div id="searchResults" class="poster-grid"></div>
        </div>

        <div id="tab-library" class="tab-panel" hidden>
          <div class="toolbar">
            <button type="button" id="scanBtn">Scan disk library</button>
            <button type="button" id="monitorBtn" class="admin-only" hidden>Run monitor now</button>
          </div>
          <div id="libraryList" class="series-list"></div>
        </div>

        <div id="tab-activity" class="tab-panel" hidden>
          <div id="activityList" class="timeline"></div>
        </div>

        <div id="tab-requests" class="tab-panel" hidden>
          <div id="requestList" class="request-list"></div>
        </div>

        <div id="tab-cleanup" class="tab-panel" hidden>
          <p id="staleSummary" class="sub"></p>
          <div id="staleList" class="stale-list"></div>
        </div>

        <div id="tab-admin" class="tab-panel" hidden>
          <form id="userForm" class="user-form">
            <h2>Add household user</h2>
            <label>Username <input name="username" required /></label>
            <label>Password <input name="password" type="password" required /></label>
            <button type="submit">Create user</button>
          </form>
          <div id="userList" class="user-list"></div>
          <div id="healthBox" class="health"></div>
        </div>
      </section>
    </div>
    <script src="/js/app.js"></script>
  </body>
</html>
